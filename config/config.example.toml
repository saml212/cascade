[project]
name = "cascade"
version = "0.1.0"

[paths]
ingest_dir = "~/podcast_ingest"          # Watch folder / SD card mount point
output_dir = "~/cascade/episodes"        # Episode output (fast storage recommended)
work_dir = "~/cascade/work"              # Temporary processing files
backup_dir = "~/cascade/backup"          # External backup drive
public_media_dir = ""                    # Public URL base for Instagram uploads

[processing]
frame_seconds = 0.1                       # Audio analysis frame size
speech_db_margin = 6                      # dB above noise floor for speech
min_segment_seconds = 2.0                 # Minimum speaker segment duration
max_channel_correlation = 0.95            # Above this = channels identical
max_channel_rms_ratio_delta = 3.0         # dB; below this = channels identical
clip_min_seconds = 30                     # Minimum clip duration
clip_max_seconds = 90                     # Maximum clip duration
clip_count = 10                           # Number of clips to generate
preserve_source_resolution = true         # Use source resolution for longform (4K stays 4K, 1080p stays 1080p)
output_resolution = "1920x1080"           # Fallback when preserve_source_resolution=false
shorts_resolution = "1080x1920"           # Shorts output resolution (always portrait)
video_crf = 22                            # CRF for longform
shorts_crf = 20                           # CRF for shorts
audio_bitrate = "192k"                    # Audio bitrate for longform
shorts_audio_bitrate = "192k"             # Audio bitrate for shorts
use_hardware_accel = true                 # Use VideoToolbox (macOS) or VAAPI (Linux)
videotoolbox_quality = 65                 # VideoToolbox H.264 quality (0-100, higher=better; 60-70 sweet spot)
lut_path = ""                             # Path to .cube LUT file for color grading (optional)
lut_interpolation = "tetrahedral"         # LUT interpolation: "tetrahedral" (accurate) or "trilinear" (fast)

# Video polish (post-LUT enhancement chain)
video_denoise = true                      # hqdn3d gentle denoise (removes HEVC mosquito noise)
video_sharpen = true                      # CAS contrast-adaptive sharpening
video_sharpen_strength = 0.3              # CAS strength 0.0-1.0 (0.3 gentle, 0.5+ aggressive)
video_polish = true                       # eq filter tonal polish
video_contrast = 1.0                      # eq contrast (1.0 = no change; LUT handles contrast)
video_saturation = 1.04                   # eq saturation (subtle lift only)
video_gamma = 1.01                        # eq gamma (very subtle brightness lift)

# Audio enhancement (Spotify/Apple/YouTube compliant — single master)
audio_enhance = true                     # Enable audio enhancement pipeline
audio_target_lufs = -16                  # Target loudness LUFS (-16 = Apple ±1 gate; Spotify/YT normalize down)
audio_target_lra = 7                     # Target loudness range (6-8 = tight spoken dialogue)
audio_target_tp = -1.0                   # True peak ceiling dBTP (-1.0 safe for AAC/Vorbis transcode)
audio_highpass_hz = 80                   # Highpass cutoff Hz (4-pole Butterworth)
audio_lowpass_hz = 16000                 # Lowpass cutoff Hz (16k preserves "air" for headphones)
audio_afftdn = true                      # FFT-based stationary noise removal (light when DFN3 active)
audio_declick = true                     # Autoregressive declicking (mouth clicks, chair squeaks)
audio_deesser = true                     # Sibilance control at 5-8 kHz
audio_denoise_model = "deepfilternet"    # ML denoise: "deepfilternet" (default), "none", or "MossFormer2_SE_48K"

[transcription]
provider = "deepgram"                     # Transcription provider
model = "nova-3"                          # Deepgram model
language = "en"                           # Language code
diarize = true                            # Enable speaker diarization (mono fallback only)
smart_format = true                       # Deepgram smart formatting
utterances = true                         # Group into utterances
keyterms = []                             # Boost recognition of specific words, e.g. ["Todd", "Laura"]

[clip_mining]
method = "llm"                            # "baseline", "transcript", or "llm"
llm_model = "claude-opus-4-6"             # Model for clip ranking + metadata
llm_temperature = 0.3                     # LLM temperature
boundary_snap_tolerance_seconds = 3.0     # Max distance to snap to silence
metadata_model = "claude-sonnet-4-20250514"

[chat]
model = "claude-sonnet-4-20250514"

[schedule]
shorts_per_day_weekday = 1                # Mon-Thu
shorts_per_day_weekend = 2                # Fri-Sun
peak_days = ["friday", "saturday", "sunday"]
longform_delay_days = 0                   # Days after approval to publish longform
timezone = "America/Los_Angeles"

[automation]
sd_card_mount = "/Volumes/Untitled"       # SD card mount point (adjust for your setup)

[platforms.youtube]
enabled = true
require_approval = true
include_shorts_hashtag = true
link_to_longform = true                   # Include longform link in Shorts description

[platforms.tiktok]
enabled = true
require_approval = true
max_caption_chars = 2200
link_to_longform = true                   # "Full episode" link in bio/comment

[platforms.instagram]
enabled = true
require_approval = true
requires_public_url = true
link_to_longform = true                   # "Link in bio" CTA

[platforms.podcast_rss]
enabled = true
feed_url = ""
audio_format = "mp3"
audio_bitrate = "128k"
artwork_path = ""

[podcast]
title = "My Podcast"                      # Your podcast name
description = "A podcast about things"    # Short description
author = "Your Name"                      # Author / show name
channel_handle = "@yourhandle"            # YouTube channel handle
artwork_url = ""                          # Public URL to your podcast artwork (JPEG)
language = "en"
category = "Society & Culture"            # Apple Podcasts category
explicit = "false"
link = ""                                 # Main website or YouTube channel URL
owner_email = ""                          # Email for RSS feed (required by Apple Podcasts)

[podcast.links]
# Fill in the platforms you use — empty strings are skipped in the generated page
# Handles are auto-extracted from URLs and shown as link labels
display_name = ""                         # Override title on links page (optional)
tagline = ""                              # Shown below your podcast name
spotify = ""
youtube = ""
instagram = ""
x = ""
tiktok = ""
apple_podcasts = ""
iheartradio = ""
github = ""

[podcast.r2]
bucket = ""                               # Cloudflare R2 bucket name
public_url = ""                           # R2 public URL (e.g. https://pub-xxx.r2.dev)
