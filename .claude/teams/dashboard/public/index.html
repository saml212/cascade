<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cascade Team Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1419;
        color: #e6e1cf;
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 13px;
      }
      header {
        background: #1a1f29;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #2a3142;
        flex-shrink: 0;
      }
      header h1 { font-size: 15px; font-weight: 600; }
      header .purpose { font-size: 12px; color: #8b95a8; margin-left: 12px; }
      header .status { display: flex; gap: 12px; align-items: center; font-size: 12px; }

      .badge {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .badge.running { background: #1f6feb; color: white; }
      .badge.done    { background: #238636; color: white; }
      .badge.error   { background: #da3633; color: white; }
      .badge.pending { background: #6e7681; color: white; }
      .badge.idle    { background: #8957e5; color: white; }
      .badge.paused  { background: #bb8009; color: white; }
      .badge.stopped { background: #6e7681; color: white; }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 340px;
        overflow: hidden;
        min-height: 0;
      }

      .agents-area { overflow-y: auto; padding: 12px; }
      .agents-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        gap: 12px;
      }

      .agent-card {
        background: #151a24;
        border: 1px solid #2a3142;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        height: 520px;
        overflow: hidden;
      }
      .agent-header {
        padding: 10px 14px;
        background: #1a2235;
        border-bottom: 1px solid #2a3142;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        flex-shrink: 0;
      }
      .agent-header-left h3 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
      .agent-header-left .motivation { font-size: 11px; color: #8b95a8; line-height: 1.4; }
      .agent-header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        flex-shrink: 0;
      }
      .agent-meta { font-size: 10px; color: #6e7681; }
      .agent-actions { display: flex; gap: 3px; margin-top: 4px; }
      .agent-actions button { padding: 2px 6px; font-size: 10px; }

      .event-stream {
        flex: 1;
        overflow-y: auto;
        padding: 8px 14px;
        font-size: 12px;
      }
      .event-stream::-webkit-scrollbar { width: 6px; }
      .event-stream::-webkit-scrollbar-thumb { background: #3a4252; border-radius: 3px; }

      .event { margin-bottom: 8px; border-radius: 5px; }

      .event-iter {
        color: #6e7681;
        font-size: 10px;
        text-align: center;
        padding: 6px 0;
        border-top: 1px dashed #2a3142;
        margin: 12px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .event-thinking {
        background: #1a1f2c;
        border-left: 2px solid #6e7681;
        padding: 6px 10px;
        color: #8b95a8;
        font-style: italic;
        font-size: 11px;
        line-height: 1.5;
      }
      .event-thinking details summary {
        cursor: pointer;
        color: #e6e1cf;
        font-weight: 600;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .event-thinking details[open] summary { margin-bottom: 4px; }
      .event-thinking-body { margin-top: 4px; white-space: pre-wrap; }

      .event-text { padding: 6px 10px; line-height: 1.6; }
      .event-text :first-child { margin-top: 0; }
      .event-text p { margin-bottom: 6px; }
      .event-text code {
        background: #0f1419;
        padding: 1px 4px;
        border-radius: 3px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 11px;
      }
      .event-text pre {
        background: #0f1419;
        padding: 8px;
        border-radius: 4px;
        overflow-x: auto;
        margin: 6px 0;
      }
      .event-text pre code { background: none; padding: 0; }
      .event-text h1, .event-text h2, .event-text h3 { margin: 8px 0 4px; font-size: 13px; }
      .event-text ul, .event-text ol { padding-left: 20px; margin: 4px 0; }
      .event-text li { margin: 2px 0; }
      .event-text strong { color: #e6e1cf; font-weight: 700; }

      .event-tool { padding: 6px 10px; font-size: 11px; }
      .event-tool .tool-header {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 3px;
      }
      .event-tool .tool-icon {
        font-weight: 700;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .event-tool .tool-name { font-weight: 600; color: #e6e1cf; }
      .event-tool .tool-input {
        color: #8b95a8;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 10px;
        word-break: break-all;
      }
      .tool-Read .tool-icon  { background: #1f6feb; color: white; }
      .tool-Write .tool-icon { background: #238636; color: white; }
      .tool-Edit .tool-icon  { background: #238636; color: white; }
      .tool-Bash .tool-icon  { background: #bb8009; color: white; }
      .tool-Grep .tool-icon,
      .tool-Glob .tool-icon { background: #8957e5; color: white; }
      .tool-WebFetch .tool-icon,
      .tool-WebSearch .tool-icon { background: #cf222e; color: white; }
      .tool-Task .tool-icon,
      .tool-Agent .tool-icon { background: #e6910d; color: white; }
      .tool-default .tool-icon { background: #6e7681; color: white; }

      .event-tool-result {
        padding: 4px 10px 4px 20px;
        font-size: 10px;
        color: #8b95a8;
        border-left: 2px solid #2a3142;
        margin-left: 10px;
      }
      .event-tool-result.error { color: #f85149; border-left-color: #da3633; }
      .event-tool-result .preview {
        font-family: "SF Mono", Menlo, monospace;
        white-space: pre-wrap;
        max-height: 120px;
        overflow-y: auto;
      }

      .dm-footer {
        padding: 8px 12px;
        background: #1a2235;
        border-top: 1px solid #2a3142;
        flex-shrink: 0;
        display: flex;
        gap: 6px;
      }
      .dm-footer input {
        flex: 1;
        background: #0f1419;
        border: 1px solid #2a3142;
        color: #e6e1cf;
        padding: 5px 8px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
      }
      .dm-footer button { padding: 5px 12px; font-size: 11px; }

      .sidebar {
        background: #0c1118;
        border-left: 1px solid #2a3142;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 10px 14px;
        background: #1a1f29;
        border-bottom: 1px solid #2a3142;
        font-size: 11px;
        font-weight: 600;
        color: #8b95a8;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex-shrink: 0;
      }
      .thread { flex: 1; overflow-y: auto; padding: 10px 14px; }
      .thread-post {
        background: #151a24;
        border-left: 2px solid #2a3142;
        padding: 8px 10px;
        margin-bottom: 8px;
        border-radius: 0 5px 5px 0;
        font-size: 11px;
      }
      .thread-post.developer { border-left-color: #d29922; }
      .thread-post.orchestrator { border-left-color: #6e7681; }
      .thread-post.agent-0 { border-left-color: #1f6feb; }
      .thread-post.agent-1 { border-left-color: #238636; }
      .thread-post.agent-2 { border-left-color: #8957e5; }
      .thread-post.agent-3 { border-left-color: #da3633; }
      .thread-post.agent-4 { border-left-color: #e6910d; }
      .thread-post-header {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: #8b95a8;
        margin-bottom: 4px;
      }
      .thread-post-author { font-weight: 600; color: #e6e1cf; }
      .thread-post-content { line-height: 1.5; }
      .thread-post-content p { margin-bottom: 4px; }
      .thread-post-content :last-child { margin-bottom: 0; }
      .thread-post-content code {
        background: #0f1419;
        padding: 1px 4px;
        border-radius: 3px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 10px;
      }
      .thread-post-content pre {
        background: #0f1419;
        padding: 6px;
        border-radius: 4px;
        overflow-x: auto;
        margin: 4px 0;
        font-size: 10px;
      }

      .thread-footer {
        padding: 8px 12px;
        background: #1a1f29;
        border-top: 1px solid #2a3142;
        flex-shrink: 0;
      }
      .thread-footer textarea {
        width: 100%;
        background: #0f1419;
        border: 1px solid #2a3142;
        color: #e6e1cf;
        padding: 6px 8px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
        min-height: 50px;
        resize: vertical;
      }
      .thread-footer button {
        width: 100%;
        background: #1f6feb;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        margin-top: 6px;
        font-weight: 600;
      }
      .thread-footer button:hover { background: #388bfd; }

      button {
        background: #6e7681;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover { background: #8b95a8; }
      button.danger { background: #da3633; }
      button.danger:hover { background: #f85149; }
      button.warn { background: #bb8009; }
      button.warn:hover { background: #d29922; }

      .empty { padding: 20px; text-align: center; color: #6e7681; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <div style="display: flex; align-items: center; gap: 8px;">
        <h1 id="team-name">Loading…</h1>
        <span class="purpose" id="team-purpose"></span>
      </div>
      <div class="status">
        <span id="elapsed">—</span>
        <button class="danger" onclick="stopTeam()" style="padding: 4px 12px; font-size: 11px;">
          Stop Team
        </button>
      </div>
    </header>

    <main>
      <div class="agents-area">
        <div class="agents-grid" id="agents-grid">
          <div class="empty">Connecting…</div>
        </div>
      </div>

      <aside class="sidebar">
        <div class="sidebar-header">Shared Thread</div>
        <div class="thread" id="thread">
          <div class="empty">Thread empty — agents will post here</div>
        </div>
        <div class="thread-footer">
          <textarea id="thread-post-input" placeholder="Message all agents…"></textarea>
          <button onclick="postToThread()">Post to Team</button>
        </div>
      </aside>
    </main>

    <script>
      let teamState = { agents: [], thread: [] };
      const agentEventStreams = {};
      const startTime = Date.now();

      marked.setOptions({ breaks: true, gfm: true });

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
        })[c]);
      }

      function truncate(s, max = 200) {
        if (!s) return "";
        return s.length > max ? s.slice(0, max) + "…" : s;
      }

      function agentIndex(name) {
        return teamState.agents.findIndex((a) => a.name === name);
      }

      function renderEvent(event) {
        if (event.type === "iteration_start") {
          return `<div class="event-iter">— Iteration ${event.iteration} —</div>`;
        }
        if (event.type === "system") return "";
        if (event.type === "assistant" && event.message?.content) {
          return event.message.content
            .map((block) => {
              if (block.type === "thinking") {
                return `<div class="event event-thinking"><details><summary>Thinking…</summary><div class="event-thinking-body">${escapeHtml(
                  block.thinking || "",
                )}</div></details></div>`;
              }
              if (block.type === "text") {
                return `<div class="event event-text">${marked.parse(block.text || "")}</div>`;
              }
              if (block.type === "tool_use") {
                const toolClass = `tool-${block.name}` || "tool-default";
                const inputPreview = truncate(JSON.stringify(block.input || {}), 180);
                return `<div class="event event-tool ${toolClass}" data-tool-id="${block.id}">
                  <div class="tool-header">
                    <span class="tool-icon">${escapeHtml(block.name)}</span>
                    <span class="tool-name">${escapeHtml(block.name)}</span>
                  </div>
                  <div class="tool-input">${escapeHtml(inputPreview)}</div>
                </div>`;
              }
              return "";
            })
            .join("");
        }
        if (event.type === "user" && event.message?.content) {
          return event.message.content
            .map((block) => {
              if (block.type === "tool_result") {
                const isError = block.is_error === true;
                const preview =
                  typeof block.content === "string"
                    ? block.content
                    : Array.isArray(block.content)
                    ? block.content.map((c) => c.text || "").join("\n")
                    : "";
                return `<div class="event event-tool-result ${isError ? "error" : ""}">
                  <div class="preview">${escapeHtml(truncate(preview, 400))}</div>
                </div>`;
              }
              return "";
            })
            .join("");
        }
        if (event.type === "result") {
          const secs = ((event.duration_ms || 0) / 1000).toFixed(1);
          return `<div class="event-iter">— iteration complete (${secs}s) —</div>`;
        }
        return "";
      }

      function renderAgentCard(agent) {
        const s = agent.state || {};
        return `
          <div class="agent-card" id="card-${agent.name}">
            <div class="agent-header">
              <div class="agent-header-left">
                <h3>${escapeHtml(agent.name)}</h3>
                <div class="motivation">${escapeHtml(agent.motivation || "")}</div>
              </div>
              <div class="agent-header-right">
                <span class="badge ${s.status || "pending"}">${s.status || "pending"}</span>
                <div class="agent-meta">${agent.model || "sonnet"} · iter ${s.iteration || 0}</div>
                <div class="agent-actions"></div>
              </div>
            </div>
            <div class="event-stream" id="stream-${agent.name}">
              <div class="empty">Waiting for agent to start…</div>
            </div>
            <div class="dm-footer">
              <input type="text" id="dm-${agent.name}" placeholder="Message ${agent.name}…"
                     onkeydown="if (event.key === 'Enter') sendDirectMessage('${agent.name}')" />
              <button onclick="sendDirectMessage('${agent.name}')">Send</button>
            </div>
          </div>
        `;
      }

      function renderAgents() {
        const grid = document.getElementById("agents-grid");
        if (!teamState.agents.length) {
          grid.innerHTML = '<div class="empty">No agents</div>';
          return;
        }
        const existingIds = Array.from(grid.querySelectorAll(".agent-card")).map((c) => c.id);
        const expectedIds = teamState.agents.map((a) => `card-${a.name}`);
        if (JSON.stringify(existingIds) !== JSON.stringify(expectedIds)) {
          grid.innerHTML = teamState.agents.map(renderAgentCard).join("");
          for (const agent of teamState.agents) subscribeToAgentEvents(agent.name);
        }
        // Always update badge / iter / action buttons
        for (const agent of teamState.agents) {
          const card = document.getElementById(`card-${agent.name}`);
          if (!card) continue;
          const s = agent.state || {};
          const badge = card.querySelector(".badge");
          if (badge) {
            badge.className = `badge ${s.status || "pending"}`;
            badge.textContent = s.status || "pending";
          }
          const meta = card.querySelector(".agent-meta");
          if (meta) meta.textContent = `${agent.model || "sonnet"} · iter ${s.iteration || 0}`;
          const actions = card.querySelector(".agent-actions");
          if (actions) {
            if (s.status === "idle" || s.status === "running") {
              actions.innerHTML = `<button class="warn" onclick="pauseAgent('${agent.name}')">Pause</button>
                <button class="danger" onclick="stopAgent('${agent.name}')">Stop</button>`;
            } else if (s.status === "paused") {
              actions.innerHTML = `<button onclick="resumeAgent('${agent.name}')">Resume</button>`;
            } else {
              actions.innerHTML = "";
            }
          }
        }
      }

      function subscribeToAgentEvents(agentName) {
        if (agentEventStreams[agentName]) return;
        const stream = document.getElementById(`stream-${agentName}`);
        if (!stream) return;
        const es = new EventSource(`/api/agents/${encodeURIComponent(agentName)}/events/stream`);
        agentEventStreams[agentName] = { eventSource: es, events: [] };
        let firstEvent = true;
        es.addEventListener("agent_event", (ev) => {
          try {
            const event = JSON.parse(ev.data);
            if (firstEvent) {
              stream.innerHTML = "";
              firstEvent = false;
            }
            const html = renderEvent(event);
            if (html) {
              const wasAtBottom =
                stream.scrollHeight - stream.scrollTop - stream.clientHeight < 50;
              stream.insertAdjacentHTML("beforeend", html);
              if (wasAtBottom) stream.scrollTop = stream.scrollHeight;
            }
          } catch (err) {
            console.error("bad event", err, ev.data);
          }
        });
      }

      function renderThread() {
        const container = document.getElementById("thread");
        const posts = teamState.thread.filter((p) => !p.author.includes("Team Thread"));
        if (!posts.length) {
          container.innerHTML = '<div class="empty">Thread empty — agents will post here</div>';
          return;
        }
        container.innerHTML = posts
          .map((p) => {
            const author = p.author.trim();
            let cls = "thread-post";
            if (author === "developer") cls += " developer";
            else if (author === "orchestrator") cls += " orchestrator";
            else {
              const idx = agentIndex(author);
              if (idx >= 0) cls += ` agent-${idx % 5}`;
            }
            return `<div class="${cls}">
              <div class="thread-post-header">
                <span class="thread-post-author">${escapeHtml(author)}</span>
                <span>${p.ts}</span>
              </div>
              <div class="thread-post-content">${marked.parse(p.content || "")}</div>
            </div>`;
          })
          .join("");
        container.scrollTop = container.scrollHeight;
      }

      function connectSSE() {
        const es = new EventSource("/api/stream");
        es.addEventListener("state", (e) => {
          teamState = JSON.parse(e.data);
          renderAgents();
          renderThread();
        });
      }

      async function loadInitial() {
        try {
          const cfg = await fetch("/api/config").then((r) => r.json());
          document.getElementById("team-name").textContent = cfg.name;
          document.getElementById("team-purpose").textContent = cfg.purpose;
        } catch {}
        connectSSE();
      }

      setInterval(() => {
        const ms = Date.now() - startTime;
        document.getElementById("elapsed").textContent =
          `${Math.floor(ms / 60000)}m ${Math.floor((ms % 60000) / 1000)}s`;
      }, 1000);

      async function post(url, body = {}) {
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        return r.json();
      }
      async function postToThread() {
        const t = document.getElementById("thread-post-input");
        if (!t.value.trim()) return;
        await post("/api/interventions/thread-post", { content: t.value });
        t.value = "";
      }
      async function sendDirectMessage(target) {
        const input = document.getElementById(`dm-${target}`);
        const content = input.value.trim();
        if (!content) return;
        await post("/api/interventions/direct-message", { target, content });
        input.value = "";
      }
      async function stopAgent(name) { await post("/api/interventions/stop-agent", { target: name }); }
      async function pauseAgent(name) { await post("/api/interventions/pause-agent", { target: name }); }
      async function resumeAgent(name) { await post("/api/interventions/resume-agent", { target: name }); }
      async function stopTeam() {
        if (!confirm("Stop all agents?")) return;
        await post("/api/interventions/stop-team");
      }

      loadInitial();
    </script>
  </body>
</html>
